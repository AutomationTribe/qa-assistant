

services:
  mysql:
    image: mysql:8.0
    container_name: regi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: regi
      MYSQL_USER: regi
      MYSQL_PASSWORD: regi
    ports:
      - '3306:3306'
    volumes:
      - regi_mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: regi_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - regi_redis_data:/data

volumes:
  regi_mysql_data:
  regi_redis_data:
